<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASDF Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0b; color: #e4e4e7; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.5); }
        .command-node { transition: all 0.2s ease; }
        .command-node:hover { background: rgba(39, 39, 42, 0.8); }
        .suggestion-active { background: rgba(39, 39, 42, 0.8); border-left: 3px solid #6366f1; }
        #chat-log::-webkit-scrollbar { width: 3px; }
        #chat-log::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center border-b border-zinc-800 bg-zinc-950/50">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
            <h1 class="text-sm font-semibold tracking-tight uppercase text-zinc-400">ASDF Engine</h1>
        </div>
        <button id="settings-toggle" class="p-2 rounded-full hover:bg-zinc-800 transition-colors">
            <i data-lucide="settings" class="w-4 h-4 text-zinc-500"></i>
        </button>
    </header>

    <!-- Chat Log -->
    <div id="chat-log" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
        <div class="text-center py-8">
            <p class="text-xs text-zinc-600 font-medium uppercase tracking-widest">System Initialized</p>
        </div>
    </div>

    <!-- Interface -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black via-black/90 to-transparent">
        <div class="max-w-xl mx-auto relative">
            
            <!-- Suggestions -->
            <div id="suggestions" class="hidden absolute bottom-full mb-3 left-0 w-full glass rounded-2xl overflow-hidden shadow-2xl border border-zinc-800 animate-in slide-in-from-bottom-2 duration-200">
                <div id="suggestions-list" class="flex flex-col">
                    <!-- Suggested Commands -->
                </div>
            </div>

            <!-- Input -->
            <div class="glass rounded-2xl p-1.5 flex items-center shadow-xl border border-zinc-800">
                <input 
                    type="text" 
                    id="input" 
                    placeholder="Type / to see commands..." 
                    class="bg-transparent flex-1 px-4 py-3 text-sm focus:outline-none placeholder-zinc-600 text-white"
                    autocomplete="off"
                >
                <button id="send" class="p-3 bg-zinc-100 hover:bg-white text-black rounded-xl transition-all disabled:opacity-30">
                    <i data-lucide="arrow-up" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="close-modal"></div>
        <div class="glass max-w-sm w-full rounded-3xl p-6 relative animate-in zoom-in duration-200">
            <h3 class="font-semibold text-lg mb-4">Configuration</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase font-bold block mb-1">GH Token</label>
                    <input type="password" id="gh-token" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none" placeholder="ghp_xxxx">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase font-bold block mb-1">Repository</label>
                    <input type="text" id="gh-repo" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none" placeholder="user/repo">
                </div>
                <button id="save-config" class="w-full bg-indigo-600 py-3 rounded-xl font-semibold text-sm hover:bg-indigo-500 transition-colors">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
