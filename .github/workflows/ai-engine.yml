name: ASDF AI Engine

on:
  repository_dispatch:
    types: [ai_command]
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: true
        default: '/tree'

jobs:
  ai-brain-execution:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai pathspec

      - name: Get Input Command
        id: cmd
        run: |
          # Use client_payload.command if available, fallback to input.command
          COMMAND="${{ github.event.client_payload.command || github.event.inputs.command }}"
          echo "COMMAND=$COMMAND" >> $GITHUB_ENV

      - name: Run AI Agent
        id: run-agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python ai_scripts/core_agent.py "{\"user_input\": \"${{ env.COMMAND }}\"}"

      - name: Self-Healing Build Check
        if: always() && (env.COMMAND == '/build' || startsWith(env.COMMAND, '/gen'))
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Simple check: if npm run build fails (if it exists)
          if [ -f "package.json" ]; then
            npm install && npm run build || (
              echo "Build failed. Retrying with AI..."
              ERROR_LOG=$(npm run build 2>&1 | tail -n 50)
              python ai_scripts/core_agent.py "{\"user_input\": \"/fix Build failed: $ERROR_LOG\"}"
            )
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "ASDF Bot"
          git config --global user.email "asdf-bot@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "AI Brain: ${{ env.COMMAND }}" && git push)
