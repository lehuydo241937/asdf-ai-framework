name: ASDF AI Engine v2.0

on:
  repository_dispatch:
    types: [ai_command]
  workflow_dispatch:
    inputs:
      command:
        description: 'Command (e.g., /gen add login)'
        required: true
        default: '/tree'
      target_repo:
        description: 'Target Repository (e.g., username/repo)'
        required: false
        default: ''

jobs:
  asdf-brain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Framework
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai pathspec

      - name: Execute Brain Logic
        id: run-asdf
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Needed for multi-repo clone/push
        run: |
          # Use client_payload if repository_dispatch, otherwise use workflow_dispatch inputs
          CMD="${{ github.event.client_payload.command || github.event.inputs.command }}"
          TARGET="${{ github.event.client_payload.target_repo || github.event.inputs.target_repo }}"
          
          python ai_scripts/core_agent.py "{\"user_input\": \"$CMD\", \"target_repo\": \"$TARGET\"}"

      - name: Push Status Update
        if: always()
        run: |
          git config --global user.name "ASDF Engine"
          git config --global user.email "asdf-engine@system.com"
          git add status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ASDF Status" && git push)
